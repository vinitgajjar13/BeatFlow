name: beatflow
description: A modern music streaming Flutter application with beautiful UI and intuitive controls.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  get: ^4.6.5

  # UI Components
  cached_network_image: ^3.2.0
  shimmer: ^2.0.0
  lottie: ^2.7.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.2

  # Navigation
  go_router: ^9.0.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP and API
  http: ^1.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
